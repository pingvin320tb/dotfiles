[colors.primary]
background = '#282828'
foreground = '#EBDBB2'

[colors.cursor]
text = '#282828'
cursor = '#EBDBB2'

[colors.normal]
black   = '#282828'
red     = '#CC241D'
green   = '#98971A'
yellow  = '#D79921'
blue    = '#458588'
magenta = '#B16286'
cyan    = '#689D6A'
white   = '#A89984'

[colors.bright]
black   = '#928374'
red     = '#FB4934'
green   = '#B8BB26'
yellow  = '#FABD2F'
blue    = '#83A598'
magenta = '#D3869B'
cyan    = '#8EC07C'
white   = '#EBDBB2'

[font]
size = 12
offset = { x = 0, y = 0 }
glyph_offset = { x = 0, y = 0 }

[font.normal]
family = "JetBrainsMono Nerd Font"

[cursor.style]
shape = "Underline"
blinking = "On" # "On", "Off", "Always"

[cursor]
blink_interval = 500

[general]

live_config_reload = true

[terminal.shell]
program = "/usr/bin/zsh"

[window]
padding = { x = 6, y = 0 }
